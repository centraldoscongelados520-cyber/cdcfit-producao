<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CDC Fit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;min-height:100vh;font-size:16px;}
#app{max-width:440px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:75px;}
.top{background:#C0392B;padding:16px;}
.top-row{display:flex;justify-content:space-between;align-items:center;}
.fab-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:6px 14px;font-size:13px;color:#fff;cursor:pointer;}
.content{padding:16px;}
.sec{font-size:13px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px;display:block;}
.btn{width:100%;padding:18px;border-radius:12px;border:none;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-red{background:#C0392B;color:#fff;}
.btn-gray{background:#f0f0f0;color:#333;}
.btn-green{background:#1D9E75;color:#fff;}
.prod-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;}
.prod-row:last-child{border:none;}
.num-circle{width:34px;height:34px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cor-carne{background:#C0392B;}
.cor-frango{background:#E67E22;}
.cor-massa{background:#8E44AD;}
.cor-peixe{background:#2980B9;}
.cor-especial{background:#27AE60;}
.badge{font-size:12px;padding:3px 10px;border-radius:10px;margin-left:8px;}
.badge.ok{background:#EAF3DE;color:#2d6a0f;}
.badge.low{background:#FFF3CD;color:#7a5000;}
.badge.zero{background:#fde8e8;color:#9b1c1c;}
.select-prato{width:100%;padding:16px;border-radius:10px;border:2px solid #ddd;font-size:18px;color:#222;background:#fff;margin-bottom:12px;}
.prato-sel-card{border-radius:14px;padding:16px;margin-bottom:20px;}
.psc-num{font-size:14px;font-weight:700;color:rgba(255,255,255,.8);}
.psc-nome{font-size:20px;font-weight:700;color:#fff;margin-top:4px;}
.bandejas-box{background:#f7f7f7;border-radius:14px;padding:18px;margin-bottom:16px;}
.bandejas-title{font-size:16px;font-weight:700;color:#333;margin-bottom:14px;}
.por-bandeja-row{display:flex;gap:10px;margin-bottom:14px;}
.pb-btn{flex:1;padding:20px 8px;border-radius:12px;border:none;cursor:pointer;text-align:center;background:#e8e8e8;}
.pb-btn.sel-8{background:#C0392B;}
.pb-btn.sel-9{background:#1a6fb5;}
.pb-num{font-size:42px;font-weight:700;line-height:1;color:#333;}
.pb-btn.sel-8 .pb-num,.pb-btn.sel-9 .pb-num{color:#fff;}
.pb-lbl{font-size:13px;margin-top:4px;color:#666;}
.pb-btn.sel-8 .pb-lbl,.pb-btn.sel-9 .pb-lbl{color:rgba(255,255,255,.85);}
.qtd-box{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.qtd-box label{font-size:14px;font-weight:600;color:#555;}
.qtd-box input{width:100%;padding:12px;border-radius:10px;border:2px solid #ddd;font-size:20px;text-align:center;font-weight:700;color:#222;}
.total-preview{background:#fff;border-radius:10px;padding:12px;text-align:center;border:2px solid #ddd;}
.tp-num{font-size:36px;font-weight:700;color:#C0392B;}
.tp-lbl{font-size:13px;color:#888;margin-top:2px;}
.outro-label{font-size:14px;color:#888;text-align:center;margin:12px 0 10px;}
.outro-row{display:flex;gap:10px;}
.outro-row input{flex:1;padding:12px;border-radius:10px;border:2px solid #ddd;font-size:18px;text-align:center;font-weight:700;color:#222;}
.outro-row button{padding:12px 20px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
.confirmar-box{border-radius:14px;padding:18px;margin-bottom:14px;text-align:center;}
.cb-qty{font-size:56px;font-weight:700;color:#fff;}
.cb-nome{font-size:16px;color:rgba(255,255,255,.9);margin-top:4px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#fff;border-top:1px solid #eee;display:flex;z-index:100;}
.nav button{flex:1;padding:12px 4px;border:none;background:transparent;cursor:pointer;}
.nav button span:first-child{font-size:22px;display:block;}
.nav button span:last-child{font-size:11px;color:#999;margin-top:2px;display:block;}
.nav button.active span:last-child{color:#C0392B;font-weight:700;}
.toast{position:fixed;top:0;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:12px 20px;border-radius:0 0 12px 12px;z-index:999;font-size:15px;font-weight:700;max-width:440px;width:100%;text-align:center;display:none;}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#C0392B;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:30px;}
#login-screen h1{color:#fff;font-size:32px;font-weight:700;margin-bottom:8px;}
#login-screen p{color:rgba(255,255,255,.8);font-size:15px;margin-bottom:40px;}
.login-box{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:340px;}
.login-label{font-size:14px;font-weight:700;color:#888;display:block;margin-bottom:6px;}
.login-perfil{display:flex;gap:10px;margin-bottom:22px;}
.login-perfil button{flex:1;padding:14px;border-radius:12px;border:2px solid #e0e0e0;background:#f7f7f7;font-size:15px;font-weight:700;cursor:pointer;color:#333;}
.login-perfil button.sel{border-color:#C0392B;background:#fff0ef;color:#C0392B;}
.login-senha{width:100%;padding:14px;border-radius:10px;border:2px solid #ddd;font-size:26px;text-align:center;letter-spacing:10px;margin-bottom:18px;color:#222;}
.login-btn{width:100%;padding:16px;background:#C0392B;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;}
.login-err{font-size:14px;color:#C0392B;text-align:center;margin-top:10px;display:none;}
</style>
</head>
<body>

<div id="login-screen">
  <h1>🍱 CDC Fit</h1>
  <p>Sistema de Gestão de Produção</p>
  <div class="login-box">
    <span class="login-label">Quem está acessando?</span>
    <div class="login-perfil">
      <button id="btn-func" class="sel">👷 Funcionário</button>
      <button id="btn-gest">👑 Gestor</button>
    </div>
    <span class="login-label">Senha</span>
    <input class="login-senha" type="password" id="login-senha" placeholder="••••" maxlength="6">
    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="login-err" id="login-err">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="top">
    <div class="top-row">
      <div>
        <div style="font-size:20px;font-weight:700;color:#fff">CDC Fit</div>
        <div style="font-size:13px;opacity:.75;color:#fff;margin-top:2px" id="topdate"></div>
      </div>
      <div style="display:flex;gap:8px">
        <div class="fab-badge" id="perfil-badge">Funcionário</div>
        <div class="fab-badge" id="btn-sair">Sair</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div id="s-home" class="content">
    <button class="btn btn-red" id="btn-ir-prod" style="margin-top:20px;padding:24px;font-size:20px">🍱 Registrar produção</button>
    <div id="h-registros"></div>
  </div>

  <div id="s-producao" class="content" style="display:none">
    <div id="p-passo1">
      <span class="sec">Selecione o prato</span>
      <select class="select-prato" id="sel-todos"><option value="">Selecionar prato...</option></select>
    </div>
    <div id="p-passo2" style="display:none">
      <div class="prato-sel-card" id="prato-card">
        <div class="psc-num" id="psc-num">Nº —</div>
        <div class="psc-nome" id="psc-nome">—</div>
      </div>
      <div class="bandejas-box">
        <div class="bandejas-title">Por bandeja — quantas embalagens?</div>
        <div class="por-bandeja-row">
          <button class="pb-btn" id="pb8"><div class="pb-num">8</div><div class="pb-lbl">embalagens</div></button>
          <button class="pb-btn" id="pb9"><div class="pb-num">9</div><div class="pb-lbl">embalagens</div></button>
        </div>
        <div class="qtd-box">
          <label>Nº de bandejas:</label>
          <input type="number" min="1" id="num-bandejas" placeholder="0">
        </div>
        <div class="total-preview">
          <div class="tp-num" id="total-preview">0</div>
          <div class="tp-lbl">marmitas no total</div>
        </div>
      </div>
      <div class="outro-label">— adicionar marmitas avulsas —</div>
      <div class="outro-row">
        <input type="number" min="0" id="qty-direto" placeholder="+ marmitas extras...">
        <button id="btn-ok-direto">Somar</button>
      </div>
      <div class="qtd-box" style="margin-top:14px">
        <label>👤 Quem montou essa bandeja?</label>
        <input type="text" id="nome-montador" placeholder="Nome da funcionária..." style="width:100%;padding:12px;border-radius:10px;border:2px solid #ddd;font-size:18px;color:#222;">
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-green" id="btn-avancar">Avançar →</button>
        <button class="btn btn-gray" id="btn-trocar-prato">↩ Trocar prato</button>
      </div>
    </div>
    <div id="p-passo3" style="display:none">
      <span class="sec">Confirme</span>
      <div class="confirmar-box" id="confirmar-card">
        <div class="cb-qty" id="cb-qty">0</div>
        <div class="cb-nome" id="cb-nome">—</div>
        <div id="cb-montador" style="font-size:14px;color:rgba(255,255,255,.85);margin-top:6px"></div>
      </div>
      <button class="btn btn-green" id="btn-confirmar">✓ Confirmar e lançar no estoque</button>
      <div id="btn-wpp-lote" style="display:none">
        <button class="btn" id="btn-wpp" style="background:#25D366;color:#fff;font-size:17px">📨 Solicitar Etiqueta no WhatsApp</button>
        <button class="btn btn-gray" id="btn-novo-lote">🍱 Novo lançamento</button>
      </div>
      <button class="btn btn-gray" id="btn-corrigir">↩ Corrigir</button>
      <button class="btn btn-gray" id="btn-cancelar">✕ Cancelar</button>
    </div>
  </div>

  <div id="s-estoque" class="content" style="display:none">
    <span class="sec">Todos os pratos</span>
    <div id="estoque-lista"></div>
  </div>

  <nav class="nav">
    <button id="nav-home" class="active"><span>🏠</span><span>Início</span></button>
    <button id="nav-producao"><span>🍱</span><span>Produção</span></button>
    <button id="nav-estoque"><span>📦</span><span>Estoque</span></button>
  </nav>
</div>

<script>
var SENHAS={funcionario:'1234',gestor:'9999'};
var perfilAtual='funcionario';
var perfilSel='funcionario';
var WHATSAPP_NUM='5511939501095';
var CORES={'1':'carne','2':'carne','3':'carne','4':'carne','5':'carne','6':'carne','7':'carne','8':'carne','26':'carne','41':'carne','42':'carne','9':'frango','10':'frango','11':'frango','12':'frango','13':'frango','14':'frango','15':'frango','27':'frango','40':'frango','43':'frango','16':'massa','17':'massa','18':'massa','19':'massa','20':'massa','21':'massa','22':'massa','23':'massa','25':'massa','28':'peixe','29':'peixe','51':'peixe','50':'especial'};
function getCor(num){return CORES[num]||'carne';}
var PRODUTOS=[{num:'1',curto:'Carne moída c/ purê abóbora',preco:16.99},{num:'2',curto:'Feijoada magra',preco:16.99},{num:'3',curto:'Hambúrguer parmegiana',preco:16.99},{num:'4',curto:'Kibe assado c/ legumes',preco:16.99},{num:'5',curto:'Escondidinho carne c/ purê batata',preco:16.99},{num:'6',curto:'Estrogonofe de carne',preco:17.49},{num:'7',curto:'Picadinho de carne',preco:17.49},{num:'8',curto:'Pernil c/ arroz e farofa',preco:16.99},{num:'9',curto:'Isca de frango c/ legumes',preco:16.49},{num:'10',curto:'Frango cremoso alho poró',preco:16.49},{num:'11',curto:'Escondidinho frango c/ purê batata',preco:16.90},{num:'12',curto:'Filé frango c/ creme milho',preco:16.99},{num:'13',curto:'Sobrecoxa assada',preco:16.99},{num:'14',curto:'Estrogonofe de frango',preco:16.99},{num:'15',curto:'Filé parmegiana',preco:17.49},{num:'16',curto:'Lasanha tradicional',preco:18.99},{num:'17',curto:'Panqueca de carne',preco:17.99},{num:'18',curto:'Panqueca de frango',preco:17.99},{num:'19',curto:'Panqueca 3 queijos',preco:17.99},{num:'20',curto:'Nhoque a bolonhesa',preco:17.90},{num:'21',curto:'Fusile pesto',preco:17.99},{num:'22',curto:'Lasanha de abobrinha',preco:17.99},{num:'23',curto:'Ravioli de carne',preco:17.99},{num:'25',curto:'Ravioli de queijo',preco:17.99},{num:'26',curto:'Isca de patinho c/ brócolis',preco:17.49},{num:'27',curto:'Frango desfiado c/ couve-flor',preco:16.99},{num:'28',curto:'Salmão c/ penne',preco:22.90},{num:'29',curto:'Salmão desfiado c/ arroz',preco:22.90},{num:'40',curto:'Frango desfiado c/ brócolis',preco:16.99},{num:'41',curto:'Escondidinho low carb abóbora',preco:16.99},{num:'42',curto:'Hambúrguer c/ brócolis',preco:16.99},{num:'43',curto:'Frango cremoso low carb',preco:16.99},{num:'50',curto:'Yakissoba de frango',preco:19.99},{num:'51',curto:'Tilápia molho praiano',preco:20.90}];
var EMIN={default:15,'28':10,'29':10,'50':10,'51':10};
var EST0={'6':39,'17':32,'18':25,'21':26,'22':20,'23':25,'25':22,'26':55,'27':28,'28':18,'29':21,'41':21,'50':68,'51':34};
var estoque,prod,pratoAtual,qtyAtual,porBandeja,ultimoLote=null;
function init(){try{estoque=JSON.parse(localStorage.getItem('cdc-est')||JSON.stringify(EST0));}catch(e){estoque=JSON.parse(JSON.stringify(EST0));}try{prod=JSON.parse(localStorage.getItem('cdc-prod')||'[]');}catch(e){prod=[];}var hoje=new Date().toDateString();prod=prod.filter(function(p){return new Date(p.ts).toDateString()===hoje;});pratoAtual=null;qtyAtual=0;porBandeja=0;}
function salvarEst(){try{localStorage.setItem('cdc-est',JSON.stringify(estoque));}catch(e){}}
function salvarProd(){try{localStorage.setItem('cdc-prod',JSON.stringify(prod));}catch(e){}}
function getPrato(num){for(var i=0;i<PRODUTOS.length;i++){if(PRODUTOS[i].num===num)return PRODUTOS[i];}return null;}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}
document.getElementById('btn-func').addEventListener('click',function(){perfilSel='funcionario';document.getElementById('btn-func').classList.add('sel');document.getElementById('btn-gest').classList.remove('sel');});
document.getElementById('btn-gest').addEventListener('click',function(){perfilSel='gestor';document.getElementById('btn-gest').classList.add('sel');document.getElementById('btn-func').classList.remove('sel');});
document.getElementById('login-btn').addEventListener('click',function(){var senha=document.getElementById('login-senha').value;if(senha===SENHAS[perfilSel]){perfilAtual=perfilSel;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('perfil-badge').textContent=perfilAtual==='gestor'?'👑 Gestor':'👷 Funcionário';document.getElementById('login-err').style.display='none';init();renderHome();}else{document.getElementById('login-err').style.display='block';document.getElementById('login-senha').value='';}});
document.getElementById('login-senha').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-btn').click();});
document.getElementById('btn-sair').addEventListener('click',function(){document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('login-senha').value='';});
function goTo(s){['home','producao','estoque'].forEach(function(x){document.getElementById('s-'+x).style.display='none';document.getElementById('nav-'+x).classList.remove('active');});document.getElementById('s-'+s).style.display='block';document.getElementById('nav-'+s).classList.add('active');if(s==='home')renderHome();if(s==='estoque')renderEstoque();if(s==='producao')resetProd();}
document.getElementById('nav-home').addEventListener('click',function(){goTo('home');});
document.getElementById('nav-producao').addEventListener('click',function(){goTo('producao');});
document.getElementById('nav-estoque').addEventListener('click',function(){goTo('estoque');});
document.getElementById('btn-ir-prod').addEventListener('click',function(){goTo('producao');});
function resetProd(){pratoAtual=null;qtyAtual=0;porBandeja=0;document.getElementById('p-passo1').style.display='block';document.getElementById('p-passo2').style.display='none';document.getElementById('p-passo3').style.display='none';document.getElementById('num-bandejas').value='';document.getElementById('qty-direto').value='';document.getElementById('total-preview').textContent='0';document.getElementById('pb8').className='pb-btn';document.getElementById('pb9').className='pb-btn';document.getElementById('btn-confirmar').style.display='';document.getElementById('btn-corrigir').style.display='';document.getElementById('btn-cancelar').style.display='';document.getElementById('btn-wpp-lote').style.display='none';document.getElementById('nome-montador').value='';var opts='<option value="">Selecionar prato...</option>';PRODUTOS.forEach(function(p){opts+='<option value="'+p.num+'">Nº '+p.num+' — '+p.curto+'</option>';});document.getElementById('sel-todos').innerHTML=opts;document.getElementById('sel-todos').onchange=function(){var p=getPrato(this.value);if(p)mostrarPasso2(p);};}
function atualizarTotal(){if(porBandeja>0){var nb=parseInt(document.getElementById('num-bandejas').value)||0;var total=nb*porBandeja;document.getElementById('total-preview').textContent=total;qtyAtual=total;}}
document.getElementById('pb8').addEventListener('click',function(){porBandeja=8;document.getElementById('pb8').className='pb-btn sel-8';document.getElementById('pb9').className='pb-btn';atualizarTotal();document.getElementById('num-bandejas').focus();});
document.getElementById('pb9').addEventListener('click',function(){porBandeja=9;document.getElementById('pb9').className='pb-btn sel-9';document.getElementById('pb8').className='pb-btn';atualizarTotal();document.getElementById('num-bandejas').focus();});
document.getElementById('num-bandejas').addEventListener('input',function(){atualizarTotal();});
document.getElementById('btn-ok-direto').addEventListener('click',function(){var v=parseInt(document.getElementById('qty-direto').value)||0;if(v>0){qtyAtual=qtyAtual+v;document.getElementById('total-preview').textContent=qtyAtual;document.getElementById('qty-direto').value='';showToast(v+' marmitas adicionadas! Total: '+qtyAtual);}else showToast('Digite uma quantidade válida');});
document.getElementById('btn-avancar').addEventListener('click',function(){if(qtyAtual>0)mostrarPasso3();else showToast('Selecione 8 ou 9 e informe o número de bandejas');});
document.getElementById('btn-trocar-prato').addEventListener('click',function(){resetProd();});
document.getElementById('btn-corrigir').addEventListener('click',function(){document.getElementById('p-passo3').style.display='none';document.getElementById('p-passo2').style.display='block';});
document.getElementById('btn-cancelar').addEventListener('click',function(){resetProd();goTo('home');});
function mostrarPasso2(p){pratoAtual=p;var cor=getCor(p.num);document.getElementById('p-passo1').style.display='none';document.getElementById('p-passo2').style.display='block';document.getElementById('prato-card').className='prato-sel-card cor-'+cor;document.getElementById('psc-num').textContent='Nº '+p.num;document.getElementById('psc-nome').textContent=p.curto;document.getElementById('num-bandejas').value='';document.getElementById('qty-direto').value='';document.getElementById('total-preview').textContent='0';qtyAtual=0;porBandeja=0;document.getElementById('pb8').className='pb-btn';document.getElementById('pb9').className='pb-btn';}
function mostrarPasso3(){var cor=getCor(pratoAtual.num);document.getElementById('p-passo2').style.display='none';document.getElementById('p-passo3').style.display='block';document.getElementById('confirmar-card').className='confirmar-box cor-'+cor;document.getElementById('cb-qty').textContent=qtyAtual;document.getElementById('cb-nome').textContent='Prato '+pratoAtual.num+' — '+pratoAtual.curto;var nm=document.getElementById('nome-montador').value;document.getElementById('cb-montador').textContent=nm?'👤 '+nm:'';}
document.getElementById('btn-confirmar').addEventListener('click',function(){if(!pratoAtual||qtyAtual<=0){showToast('Quantidade inválida!');return;}estoque[pratoAtual.num]=(estoque[pratoAtual.num]||0)+qtyAtual;var nomeMontador=document.getElementById('nome-montador').value||'Não informado';prod.push({num:pratoAtual.num,curto:pratoAtual.curto,qty:qtyAtual,nome:nomeMontador,ts:new Date().toISOString()});salvarEst();salvarProd();ultimoLote={num:pratoAtual.num,curto:pratoAtual.curto,qty:qtyAtual,nome:nomeMontador};document.getElementById('btn-confirmar').style.display='none';document.getElementById('btn-corrigir').style.display='none';document.getElementById('btn-cancelar').style.display='none';document.getElementById('btn-wpp-lote').style.display='block';showToast(qtyAtual+'x Prato '+pratoAtual.num+' lançado!');});
document.getElementById('btn-wpp').addEventListener('click',function(){if(!ultimoLote){showToast('Nenhum lote para enviar!');return;}salvarEst();salvarProd();var data=new Date().toLocaleDateString('pt-BR');var hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});var nomeEnc=encodeURIComponent(ultimoLote.nome||'Não informado');var msg='%F0%9F%8D%B1 *CDC Fit %E2%80%94 Solicita%C3%A7%C3%A3o de Etiqueta*'+'%0A%0A%F0%9F%93%85 '+data+' %C3%A0s '+hora+'%0A%0A%E2%80%A2 Prato '+ultimoLote.num+' %E2%80%94 '+encodeURIComponent(ultimoLote.curto)+'%0A%F0%9F%93%A6 *Quantidade: '+ultimoLote.qty+' marmitas*'+'%0A%F0%9F%91%A4 *Montado por: '+nomeEnc+'*'+'%0A%0A%E2%9C%85 Favor emitir etiqueta!';window.open('https://wa.me/'+WHATSAPP_NUM+'?text='+msg,'_blank');setTimeout(function(){ultimoLote=null;resetProd();renderHome();goTo('home');},1000);});
document.getElementById('btn-novo-lote').addEventListener('click',function(){ultimoLote=null;resetProd();goTo('producao');});
function renderHome(){document.getElementById('topdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});var tot=prod.reduce(function(s,p){return s+p.qty;},0);var rh='';if(prod.length){var agrup={};prod.forEach(function(p){if(!agrup[p.num])agrup[p.num]={num:p.num,curto:p.curto,qty:0,ultima:p.ts};agrup[p.num].qty+=p.qty;if(p.ts>agrup[p.num].ultima)agrup[p.num].ultima=p.ts;});rh='<span class="sec">Produção de hoje — '+tot+' marmitas</span>';Object.keys(agrup).forEach(function(k){var p=agrup[k];var cor=getCor(p.num);var hr=new Date(p.ultima).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});rh+='<div class="prod-row"><div style="display:flex;align-items:center;gap:12px"><div class="num-circle cor-'+cor+'">'+p.num+'</div><div><div style="font-size:15px;color:#222;font-weight:600">'+p.curto+'</div><div style="font-size:13px;color:#888">Último às '+hr+'</div></div></div><div style="font-size:20px;font-weight:700;color:#C0392B">'+p.qty+'</div></div>';});}document.getElementById('h-registros').innerHTML=rh;}
function renderEstoque(){var h='';PRODUTOS.forEach(function(p){var a=estoque[p.num]||0;var m=EMIN[p.num]||EMIN.default;var sc=a===0?'zero':a<m?'low':'ok';var st=a===0?'Zerado':a<m?'Baixo':'OK';var cor=getCor(p.num);h+='<div class="prod-row"><div style="display:flex;align-items:center;gap:12px"><div class="num-circle cor-'+cor+'">'+p.num+'</div><span style="font-size:15px;color:#222;font-weight:500">'+p.curto+'</span></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px;font-weight:700">'+a+'</span><span class="badge '+sc+'">'+st+'</span></div></div>';});document.getElementById('estoque-lista').innerHTML=h;}
</script>
